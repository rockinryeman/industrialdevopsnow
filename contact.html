<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Industrial DevOps Now</title>
<meta name="description" content="Get in touch with Industrial DevOps Now.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="site-header"></div>

<div class="hero small">
  <div class="wrap">
    <div class="eyebrow">Contact</div>
    <h1>Get in touch</h1>
    <p class="lead">Send a message or ask a question — about workshops, speaking engagements, or
      working together. We'll do our best to get back to you soon.</p>
  </div>
</div>

<section>
  <div class="wrap">
    <!-- Formspree endpoint — submissions emailed to the address configured in Formspree -->
    <form class="contact" action="https://formspree.io/f/mwvzjoqa" method="POST">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Questions or comments *</label>
      <textarea id="message" name="message" required></textarea>

      <button class="btn teal" type="submit">Send</button>
    </form>
    <p class="sub" style="margin-top:22px"><em>We'll do our best to get back to you soon.</em></p>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/site.js"></script>
</body>
</html>
